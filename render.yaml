# render.yaml — TechnoSanté Méditerranée
# Déploiement automatique sur Render.com
# Placer ce fichier à la RACINE du repo

services:
  # ── API Express ──────────────────────────────────────────
  - type: web
    name: technosante-api
    runtime: node
    region: frankfurt  # le plus proche de Montpellier
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: technosante-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://technosante-mediterranee.vercel.app
      # À renseigner manuellement dans le dashboard Render :
      # SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER, SMTP_PASS
      # CONTACT_TO, CONTACT_FROM
      # ADMIN_EMAIL, ADMIN_PASSWORD, ADMIN_NAME

  # ── PostgreSQL ───────────────────────────────────────────
databases:
  - name: technosante-db
    databaseName: technosante
    user: technosante
    region: frankfurt
    plan: free